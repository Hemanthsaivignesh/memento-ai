stages:
  - quality
  - security
  - test
  - build

variables:
  PYTHON_VERSION: "3.10"
  NODE_VERSION: "18"

# Python Code Quality
python-format:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install black
  script:
    - black --check backend/
  only:
    - branches
    - merge_requests

python-lint:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install flake8
  script:
    - flake8 backend/ --max-line-length=100 --exclude=__pycache__,.venv
  only:
    - branches
    - merge_requests

python-type-check:
  stage: quality
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install mypy
  script:
    - mypy backend/ --ignore-missing-imports --no-strict-optional
  allow_failure: true
  only:
    - branches
    - merge_requests

# Security Scanning
python-security:
  stage: security
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install bandit
  script:
    - bandit -r backend/ -f json -o bandit-report.json || true
    - bandit -r backend/
  artifacts:
    reports:
      sast: bandit-report.json
  only:
    - branches
    - merge_requests

dependency-scan:
  stage: security
  image: python:${PYTHON_VERSION}
  before_script:
    - pip install safety
  script:
    - safety check --json > safety-report.json || true
    - safety check
  artifacts:
    reports:
      dependency_scanning: safety-report.json
  allow_failure: true
  only:
    - branches
    - merge_requests

# Frontend Quality
frontend-lint:
  stage: quality
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run lint || true
  only:
    - branches
    - merge_requests

frontend-build:
  stage: build
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm install
  script:
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  only:
    - branches
    - merge_requests

# Tests
python-tests:
  stage: test
  image: python:${PYTHON_VERSION}
  before_script:
    - cd backend
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
  script:
    - pytest tests/ --cov=. --cov-report=xml --cov-report=html || true
    - echo "Python tests completed"
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: backend/coverage.xml
    paths:
      - backend/htmlcov/
    expire_in: 1 hour
  allow_failure: true
  only:
    - branches
    - merge_requests

frontend-tests:
  stage: test
  image: node:${NODE_VERSION}
  before_script:
    - cd frontend
    - npm install
  script:
    - npm test -- --coverage --watchAll=false || true
    - echo "Frontend tests completed"
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: frontend/coverage/cobertura-coverage.xml
    paths:
      - frontend/coverage/
    expire_in: 1 hour
  allow_failure: true
  only:
    - branches
    - merge_requests
